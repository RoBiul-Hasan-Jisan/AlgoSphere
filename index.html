<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Prevent theme flash BEFORE render -->
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("AlgoSphere-theme");
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;

          const isDark = theme
            ? theme === "dark"
            : prefersDark;

          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>AlgoSphere - Learn Algorithms, Visually & Interactively</title>
    <meta
      name="description"
      content="Master algorithms with interactive visuals, step-by-step explanations, and hands-on practice. Learn faster, understand deeper."
    />
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:title" content="AlgoSphere - Learn Algorithms Visually" />
    <meta
      property="og:description"
      content="Interactive algorithm learning platform with visuals, code, and practice."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AlgoSphere" />
    <meta
      name="twitter:description"
      content="Learn algorithms interactively with visuals and practice."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Prevent white flash before React loads */
      body {
        margin: 0;
        background: #0b1220;
        font-family: Inter, sans-serif;
      }
      .dark body {
        background: #0b1220;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
